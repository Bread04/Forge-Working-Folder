<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 1.5rem;
      background: #0a0a0c;
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .timer {
      font-size: 3rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      color: #fff;
    }
    .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.4);
    }
    .controls {
      display: flex;
      gap: 1rem;
    }
    button {
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: white;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    button:hover {
      background: rgba(255,255,255,0.1);
    }
    #start-stop {
      background: #6366f1;
      border: none;
    }
    #start-stop.running {
      background: #ef4444;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="label">FocusFlow Enforcer</div>
    <div class="timer" id="timer">00:00</div>
    <div class="controls">
      <button id="start-stop">Start</button>
      <button id="reset">Reset</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
